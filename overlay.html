<!DOCTYPE html>
<html>
<head>
    <title>{{ court_name }} Countdown</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='overlay.css') }}">
</head>

<body>

<div class="overlay">

    <div class="header">
        <span class="live-dot"></span>
        NEXT GAME
        <span class="court">{{ court_name }}</span>
    </div>


    <div class="match" id="next">
        Loading...
    </div>


</div>


<script>


function secondsToTime(totalSeconds) {

    totalSeconds = Math.max(0, totalSeconds);

    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return (
        String(hours).padStart(2,"0") + ":" +
        String(minutes).padStart(2,"0") + ":" +
        String(seconds).padStart(2,"0")
    );
}



function updateCourt(){

fetch("/api/court/{{ court_name }}")

.then(r => r.json())

.then(data => {


if(data.next){

document.getElementById("next").innerHTML = `

<div class="teams">

${data.next.team_a}

<span>vs</span>

${data.next.team_b}

</div>


<div class="league">
${data.next.league}
</div>


<div class="countdown">
${secondsToTime(data.next.countdown)}
</div>


<div class="datetime">
${data.next.time} · ${data.next.date}
</div>

`;

}

else {

document.getElementById("next").innerHTML = `

<div class="waiting">
NO UPCOMING GAME
</div>

`;

}

});

}


updateCourt();

setInterval(updateCourt,1000);


</script>


</body>
</html>
