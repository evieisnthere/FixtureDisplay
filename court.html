<!DOCTYPE html>
<html>
<head>
    <title>{{ court_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="floodlight floodlight-left"></div>
    <div class="floodlight floodlight-right"></div>

    <div class="overlay">

        <div class="eyebrow">
            <span class="rule"></span>
            <span class="eyebrow-text">{{ court_name }}</span>
            <span class="rule"></span>
        </div>


        <div class="block now-playing" id="now-playing">
            Loading...
        </div>


        <div class="block up-next" id="up-next">
        </div>


        <div class="banner">
            <span class="banner-highlight">LIVE</span> ON {{ court_name|upper }}
        </div>


        <div class="clock" id="clock">
            Loading...
        </div>

    </div>


<script>

function secondsToTime(totalSeconds) {

    totalSeconds = Math.max(0, totalSeconds);

    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return (
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0")
    );
}


function updateCourt() {

    fetch("/api/court/{{ court_name }}")
        .then(response => response.json())
        .then(data => {


            // clock
            document.getElementById("clock").innerHTML = data.clock;



            // current match
            if (data.current) {

                document.getElementById("now-playing").innerHTML = `
                    <span class="label label-gold">JUST PLAYED</span>
                    <div class="teams small">${data.current.league}</div>

                    <div class="teams">
                        ${data.current.team_a}
                        <span class="vs">vs</span>
                        ${data.current.team_b}
                    </div>

                    <div class="sub">
                        Started ${data.current.time}
                    </div>
                `;

            } else {

                document.getElementById("now-playing").innerHTML = `
                    <span class="label">
                        NO MATCH IN PROGRESS
                    </span>
                `;
            }



            // next match + countdown
            if (data.next) {

                document.getElementById("up-next").innerHTML = `
                    <span class="label">
                        UP NEXT · ${data.next.time} · ${data.next.date}
                        · ${secondsToTime(data.next.countdown)}
                    </span>

                    <div class="sub">${data.next.league}</div>
                    <div class="teams small">
                        ${data.next.team_a}
                        <span class="vs">vs</span>
                        ${data.next.team_b}
                    </div>
                `;

            } else {

                document.getElementById("up-next").innerHTML = "";

            }

        });
}


updateCourt();
setInterval(updateCourt, 1000);

</script>


</body>
</html>
